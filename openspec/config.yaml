schema: spec-driven

context: |
  Tech stack: Rust (2021 edition, MSRV 1.75), cargo workspace
  Key libs: csgrs (CSG booleans), bvh (spatial), meshopt (mesh), nalgebra/glam (math), stl_io, tobj
  Architecture: Pipeline-based with stages (loader → boolean → repair → orientation → split → pour → pins → mold_block → decimate)
  Testing: cargo test, integration tests in tests/
  3D domain: Automatic mold generation from STL/OBJ models

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected pipeline stages
  specs:
    - Use Given/When/Then format for scenarios
    - Reference affected src/ files
  design:
    - Include geometry diagrams for complex mesh operations
    - Document edge cases (degenerate geometry, floating points)
  tasks:
    - Group by pipeline stage
    - Keep tasks atomic (one concept per task)
  apply:
    - Follow Rust idioms: Result/Error types, no panics in lib
    - Use existing math types (nalgebra::Point3, glam::Vec3)
  verify:
    - Run cargo test and cargo clippy
    - Validate with test STL files in test_data/
